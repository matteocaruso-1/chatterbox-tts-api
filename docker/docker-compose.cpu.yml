version: "3.8"

services:
  chatterbox-tts:
    build:
      context: .
      dockerfile: docker/Dockerfile.cpu

    container_name: chatterbox-tts-api-cpu

    ports:
      - "4123:4123"

    environment:
      PORT: "4123"
      HOST: "0.0.0.0"

      EXAGGERATION: "0.5"
      CFG_WEIGHT: "0.5"
      TEMPERATURE: "0.8"

      MAX_CHUNK_LENGTH: "280"
      MAX_TOTAL_LENGTH: "3000"

      LONG_TEXT_DATA_DIR: "/data/long_text_jobs"
      LONG_TEXT_MAX_LENGTH: "100000"
      LONG_TEXT_CHUNK_SIZE: "2500"
      LONG_TEXT_SILENCE_PADDING_MS: "200"
      LONG_TEXT_JOB_RETENTION_DAYS: "7"
      LONG_TEXT_MAX_CONCURRENT_JOBS: "3"

      VOICE_SAMPLE_PATH: "/app/voice-sample.mp3"
      DEVICE: "cpu"
      MODEL_CACHE_DIR: "/cache"
      VOICE_LIBRARY_DIR: "/voices"

      MEMORY_CLEANUP_INTERVAL: "5"
      ENABLE_MEMORY_MONITORING: "true"

    volumes:
      - chatterbox-models:/cache
      - chatterbox-voices:/voices
      - chatterbox-longtext-data:/data/long_text_jobs

    restart: unless-stopped

    healthcheck:
      test:
        - CMD-SHELL
        - curl -f http://localhost:4123/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

volumes:
  chatterbox-models:
    driver: local

  chatterbox-voices:
    driver: local

  chatterbox-longtext-data:
    driver: local
